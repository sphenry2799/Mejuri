<!-- Mobile Menu -->
<nav>
    <div>
        <ul class="navbar-nav d-lg-none list-inline mb-0 w-100">
            <!-- Mobile Search -->
            <li class="list-inline-item">
                <a class="nav-link text-black d-block" href="#" id="mobile-search" data-toggle="dropdown"
                   aria-haspopup="true" aria-expanded="false">
                    <div class="text-center">
                        <div><i class="fas fa-search fa-lg"></i></div>
                            <p class="my-0">Search</p>
                    </div>
                </a>
                <div class="dropdown-menu border-0 w-100 p-3 rounded-0 my-0" role="menu" aria-labelledby="mobile-search">
                        <form class="form" method="GET" action="{% url 'products' %}">
                            <div class="input-group w-100">
                                <input class="form-control border border-black rounded-0" type="text" name="q"
                                    placeholder="Search our site">
                                <div class="input-group-append">
                                    <button class="btn btn-black border border-black rounded-0" type="submit">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </div>
                        </form>
                </div>
            </li>

            <!-- User Account -->
            <li class="list-inline-item dropdown">
                <a class="nav-link text-black d-block" href="#" id="user-options-mobile" data-toggle="dropdown"
                   aria-haspopup="true" aria-expanded="false">
                    <div class="text-center">
                        <div><i class="fas fa-user fa-lg"></i></div>
                        <p class="my-0">My Account</p>
                    </div>
                </a>
                <div class="dropdown-menu border-0" role="menu" aria-labelledby="user-options-mobile">
                    {% if request.user.is_authenticated %}
                        {% if request.user.is_superuser %}
                            <a href="{% url 'account_logout' %}" class="dropdown-item">Product Management</a>
                        {% endif %}
                        <a href="" class="dropdown-item">My Profile</a>
                        <a href="{% url 'account_logout' %}" class="dropdown-item">Logout</a>
                    {% else %}
                        <a href="{% url 'account_signup' %}" class="dropdown-item">Register</a>
                        <a href="{% url 'account_login' %}" class="dropdown-item">Login</a>
                    {% endif %}
                </div>
            </li>

            <!-- Shopping Bag -->
            <li class="list-inline-item">
                <a class="nav-link d-block {% if grand_total %}text-primary font-weight-bold{% else %}text-black{% endif %}"
                   href="{% url 'view_bag' %}">
                    <div class="text-center">
                        <div><i class="fas fa-shopping-bag fa-lg"></i></div>
                            <p class="my-0">
                                {% if grand_total %}
                                    ${{ grand_total|floatformat:2 }}
                                {% else %}
                                    $0.00
                                {% endif %}
                            </p>
                    </div>
                </a>
            </li>
        </ul>
    </div>
</nav>
